<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Gym Tracker" />
  <title>Gym Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0a0a0a; color: #e8e0d0; font-family: 'DM Mono', 'Courier New', monospace; -webkit-tap-highlight-color: transparent; }
    input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input, select, button, textarea { font-family: 'DM Mono', 'Courier New', monospace; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    #root { min-height: 100vh; }
    @keyframes prPop { 0%{transform:scale(0.5);opacity:0} 60%{transform:scale(1.2)} 100%{transform:scale(1);opacity:1} }
    @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    const STORAGE_KEY = "gymtracker-v2";
    const PRESET_EXERCISES = [
      "Bankdrücken","Kniebeugen","Kreuzheben","Schulterdrücken",
      "Latzug","Rudern","Bizepscurl","Trizepsdrücken",
      "Beinpresse","Lunges","Klimmzüge","Dips",
      "Schrägbankdrücken","Seitheben","Frontheben","Wadenheben"
    ];
    const WEEKDAYS = ["So","Mo","Di","Mi","Do","Fr","Sa"];
    const MONTHS = ["Jan","Feb","Mär","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Dez"];
    const TRAINING_TYPES = ["Push","Pull","Legs","Full Body","Upper","Lower","Rest 🛋️"];
    const TYPE_COLORS = { "Push":"#d4a017","Pull":"#5b9bd5","Legs":"#7a9b5b","Full Body":"#9b5bd4","Upper":"#d4625b","Lower":"#5bd4c4","Rest 🛋️":"#444" };

    function formatDate(dateStr) {
      const d = new Date(dateStr + "T12:00:00");
      return `${d.getDate()}. ${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
    }
    function toLocalDateStr(date = new Date()) {
      return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
    }
    function getWeekDates(dateStr) {
      const d = new Date(dateStr + "T12:00:00");
      const day = d.getDay();
      const monday = new Date(d); monday.setDate(d.getDate() - ((day+6)%7));
      return Array.from({length:7},(_,i)=>{ const x=new Date(monday); x.setDate(monday.getDate()+i); return toLocalDateStr(x); });
    }
    function loadData() {
      try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : {workouts:{},bodyweight:{}}; }
      catch { return {workouts:{},bodyweight:{}}; }
    }
    function saveDataLocal(data) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
    }

    // ── Icons ──
    const PlusIcon = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
    const TrashIcon = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>;
    const ChevronIcon = ({up}) => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points={up?"18 15 12 9 6 15":"6 9 12 15 18 9"}/></svg>;
    const DumbbellIcon = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 4v16M18 4v16M2 9h4M18 9h4M2 15h4M18 15h4M6 9h12M6 15h12"/></svg>;
    const ChartIcon = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>;
    const CalendarIcon = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>;
    const HistoryIcon = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/></svg>;
    const WeekIcon = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="14" x2="8" y2="18"/><line x1="12" y1="14" x2="12" y2="18"/><line x1="16" y1="14" x2="16" y2="18"/></svg>;

    function SparkLine({ data, color="#d4a017" }) {
      if (!data||data.length<2) return null;
      const vals=data.map(d=>d.value), min=Math.min(...vals), max=Math.max(...vals), range=max-min||1;
      const w=300,h=70,pad=10;
      const pts=data.map((d,i)=>{
        const x=pad+(i/(data.length-1))*(w-pad*2);
        const y=h-pad-((d.value-min)/range)*(h-pad*2);
        return `${x},${y}`;
      }).join(" ");
      const gid=`g${color.replace(/[^a-z0-9]/gi,'')}`;
      return (
        <svg viewBox={`0 0 ${w} ${h}`} style={{width:"100%",height:70}}>
          <defs><linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={color} stopOpacity="0.3"/>
            <stop offset="100%" stopColor={color} stopOpacity="0"/>
          </linearGradient></defs>
          <polygon points={`${pad},${h} ${pts} ${w-pad},${h}`} fill={`url(#${gid})`}/>
          <polyline points={pts} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          {data.map((d,i)=>{
            const x=pad+(i/(data.length-1))*(w-pad*2);
            const y=h-pad-((d.value-min)/range)*(h-pad*2);
            return <circle key={i} cx={x} cy={y} r="3.5" fill={color}/>;
          })}
        </svg>
      );
    }

    function PRBadge() {
      return <span style={{display:"inline-block",animation:"prPop .4s ease",fontSize:16,marginLeft:6}} title="Personal Record!">🏆</span>;
    }

    function App() {
      const [view, setView] = useState("log");
      const [data, setData] = useState(loadData);
      const workouts = data.workouts || {};
      const bodyweight = data.bodyweight || {};

      const [selectedDate, setSelectedDate] = useState(toLocalDateStr());
      const [exercises, setExercises] = useState([]);
      const [note, setNote] = useState("");
      const [trainingType, setTrainingType] = useState("");
      const [bwInput, setBwInput] = useState("");
      const [newExName, setNewExName] = useState("");
      const [showPresets, setShowPresets] = useState(false);
      const [statsEx, setStatsEx] = useState("");
      const [statsRange, setStatsRange] = useState("month");
      const [saved, setSaved] = useState(false);
      const [newPRs, setNewPRs] = useState([]);
      const [showBw, setShowBw] = useState(false);
      const [showTemplates, setShowTemplates] = useState(false);
      const [templateView, setTemplateView] = useState("list");
      const [editingTemplate, setEditingTemplate] = useState(null);
      const [tplName, setTplName] = useState("");
      const [tplText, setTplText] = useState("");
      const [tplType, setTplType] = useState("");

      const dayData = workouts[selectedDate] || {};

      // Template helpers
      const templates = (data.templates || []);

      function parseTemplateText(text) {
        const lines = text.split("\n").map(l=>l.trim()).filter(Boolean);
        const result = [];
        for (const line of lines) {
          const m = line.match(/^(.+?)\s+(\d+)\s*[x×xX]\s*(\d+)(?:-\d+)?/);
          if (m) {
            const name = m[1].replace(/[:\-\u2013#•]/g,"").trim();
            const sets = parseInt(m[2]);
            const reps = m[3];
            if (name.length > 1 && sets > 0 && sets <= 20) {
              result.push({ name, sets: Array.from({length:sets}, ()=>({weight:"",reps})) });
            }
          } else {
            const name = line.replace(/^[\d\.\-\u2013#•*]+\s*/,"").replace(/[:\-\u2013]/g,"").trim();
            if (name.length > 2 && !name.match(/^\d+$/)) {
              result.push({ name, sets:[{weight:"",reps:""}] });
            }
          }
        }
        return result;
      }

      function saveTemplate() {
        if (!tplName.trim()) return;
        const parsed = parseTemplateText(tplText);
        const tpl = { id: editingTemplate || Date.now().toString(), name: tplName.trim(), text: tplText, type: tplType, exercises: parsed };
        const next = { ...data, templates: editingTemplate
          ? templates.map(t=>t.id===editingTemplate?tpl:t)
          : [...templates, tpl]
        };
        persist(next);
        setTemplateView("list"); setTplName(""); setTplText(""); setTplType(""); setEditingTemplate(null);
      }

      function deleteTemplate(id) {
        if (!window.confirm("Template loeschen?")) return;
        const next = { ...data, templates: templates.filter(t=>t.id!==id) };
        persist(next);
      }

      function loadTemplate(tpl) {
        if (exercises.length > 0 && !window.confirm("Aktuelle Uebungen ersetzen?")) return;
        setExercises(JSON.parse(JSON.stringify(tpl.exercises)));
        if (tpl.type) setTrainingType(tpl.type);
        setShowTemplates(false);
      }

      function startEdit(tpl) {
        setEditingTemplate(tpl.id); setTplName(tpl.name); setTplText(tpl.text); setTplType(tpl.type||"");
        setTemplateView("edit");
      }

      useEffect(() => {
        const d = workouts[selectedDate] || {};
        setExercises(d.exercises ? JSON.parse(JSON.stringify(d.exercises)) : []);
        setNote(d.note || "");
        setTrainingType(d.type || "");
        setBwInput(bodyweight[selectedDate] || "");
        setSaved(!!workouts[selectedDate]);
        setNewPRs([]);
      }, [selectedDate]);

      function persist(next) {
        setData(next);
        saveDataLocal(next);
      }

      function saveDay() {
        const cleaned = exercises.filter(ex => ex.name.trim() && ex.sets.some(s => s.weight||s.reps));
        // Detect PRs
        const prs = [];
        cleaned.forEach(ex => {
          const maxNow = Math.max(...ex.sets.filter(s=>s.weight).map(s=>parseFloat(s.weight)||0));
          const allPast = Object.entries(workouts)
            .filter(([d])=>d!==selectedDate)
            .flatMap(([,v])=>(v.exercises||[]).filter(e=>e.name===ex.name).flatMap(e=>e.sets.filter(s=>s.weight).map(s=>parseFloat(s.weight)||0)));
          const prevMax = allPast.length ? Math.max(...allPast) : 0;
          if (maxNow > prevMax && maxNow > 0) prs.push(ex.name);
        });
        setNewPRs(prs);

        const next = { ...data };
        next.workouts = { ...workouts };
        if (cleaned.length===0 && !note && !trainingType) {
          delete next.workouts[selectedDate];
        } else {
          next.workouts[selectedDate] = { exercises: cleaned, note, type: trainingType };
        }
        if (bwInput) {
          next.bodyweight = { ...bodyweight, [selectedDate]: bwInput };
        } else {
          next.bodyweight = { ...bodyweight };
          delete next.bodyweight[selectedDate];
        }
        persist(next);
        setSaved(true);
        setTimeout(()=>setSaved(false), 2500);
      }

      function addExercise(name) {
        const n=(name||newExName).trim(); if(!n) return;
        setExercises(prev=>[...prev,{name:n,sets:[{weight:"",reps:""}]}]);
        setNewExName(""); setShowPresets(false);
      }
      function removeExercise(ei) { setExercises(prev=>prev.filter((_,i)=>i!==ei)); }
      function addSet(ei) { setExercises(prev=>prev.map((ex,i)=>i===ei?{...ex,sets:[...ex.sets,{weight:"",reps:""}]}:ex)); }
      function removeSet(ei,si) { setExercises(prev=>prev.map((ex,i)=>i===ei?{...ex,sets:ex.sets.filter((_,j)=>j!==si)}:ex)); }
      function updateSet(ei,si,field,val) { setExercises(prev=>prev.map((ex,i)=>i===ei?{...ex,sets:ex.sets.map((s,j)=>j===si?{...s,[field]:val}:s)}:ex)); }
      function updateExName(ei,val) { setExercises(prev=>prev.map((ex,i)=>i===ei?{...ex,name:val}:ex)); }

      function getLastSession(exName) {
        const past=Object.keys(workouts).filter(d=>d<selectedDate).sort((a,b)=>b.localeCompare(a));
        for(const d of past){
          const found=(workouts[d].exercises||[]).find(ex=>ex.name===exName);
          if(found) return {date:d,sets:found.sets.filter(s=>s.weight||s.reps)};
        }
        return null;
      }

      function getExerciseMaxEver(exName, beforeDate) {
        const all = Object.entries(workouts)
          .filter(([d])=>!beforeDate||d<beforeDate)
          .flatMap(([,v])=>(v.exercises||[]).filter(e=>e.name===exName).flatMap(e=>e.sets.filter(s=>s.weight).map(s=>parseFloat(s.weight)||0)));
        return all.length ? Math.max(...all) : 0;
      }

      const allExNames = useMemo(()=>{
        const s=new Set();
        Object.values(workouts).forEach(d=>(d.exercises||[]).forEach(e=>s.add(e.name)));
        return Array.from(s).sort();
      },[workouts]);

      const statsData = useMemo(()=>{
        if(!statsEx) return [];
        return Object.entries(workouts).flatMap(([date,day])=>
          (day.exercises||[]).filter(ex=>ex.name===statsEx).map(ex=>{
            const valid=ex.sets.filter(s=>s.weight&&s.reps);
            if(!valid.length) return null;
            return {date,maxWeight:Math.max(...valid.map(s=>parseFloat(s.weight)||0)),volume:valid.reduce((sum,s)=>sum+(parseFloat(s.weight)||0)*(parseInt(s.reps)||0),0)};
          }).filter(Boolean)
        ).sort((a,b)=>a.date.localeCompare(b.date));
      },[workouts,statsEx]);

      const filtered = useMemo(()=>{
        const now=new Date();
        return statsData.filter(p=>{
          const d=new Date(p.date);
          if(statsRange==="month") return now-d<=30*86400000;
          if(statsRange==="3m") return now-d<=90*86400000;
          if(statsRange==="6m") return now-d<=180*86400000;
          return true;
        });
      },[statsData,statsRange]);

      const trainingDays = Object.keys(workouts).sort((a,b)=>b.localeCompare(a));

      // Week summary
      const weekDates = getWeekDates(selectedDate);
      const weekSummary = useMemo(()=>{
        let sessions=0, volume=0, muscles=new Set();
        weekDates.forEach(d=>{
          const day=workouts[d];
          if(!day||!day.exercises||day.exercises.length===0) return;
          if(day.type && day.type!=="Rest 🛋️") sessions++;
          if(day.type) muscles.add(day.type);
          (day.exercises||[]).forEach(ex=>ex.sets.forEach(s=>{
            volume+=(parseFloat(s.weight)||0)*(parseInt(s.reps)||0);
          }));
        });
        return {sessions, volume: Math.round(volume), types: Array.from(muscles)};
      },[workouts, selectedDate]);

      // Body weight for stats
      const bwData = useMemo(()=>{
        return Object.entries(bodyweight).map(([date,w])=>({date,value:parseFloat(w)})).filter(x=>!isNaN(x.value)).sort((a,b)=>a.date.localeCompare(b.date));
      },[bodyweight]);

      const S = {
        app:{minHeight:"100vh",background:"#0a0a0a",color:"#e8e0d0",paddingBottom:100},
        header:{padding:"20px 20px 0",borderBottom:"1px solid #1e1e1e"},
        card:{background:"#111",border:"1px solid #1e1e1e",borderRadius:10,marginBottom:14,overflow:"hidden"},
        input:{background:"#1a1a1a",border:"1px solid #252525",borderRadius:5,padding:"8px 10px",fontSize:14,textAlign:"center",width:"100%",color:"#e8e0d0",outline:"none"},
        saveBtn:{width:"100%",background:"#d4a017",color:"#0a0a0a",borderRadius:8,padding:14,fontSize:13,fontWeight:700,letterSpacing:2,marginTop:8,cursor:"pointer",border:"none"},
        tag:(a)=>({padding:"6px 14px",borderRadius:5,fontSize:11,letterSpacing:1,background:a?"#d4a017":"#1a1a1a",color:a?"#0a0a0a":"#666",border:`1px solid ${a?"#d4a017":"#2a2a2a"}`,cursor:"pointer"}),
        navBtn:(a)=>({padding:"10px 0",marginRight:18,display:"flex",alignItems:"center",gap:6,fontSize:11,letterSpacing:2,fontWeight:500,color:a?"#d4a017":"#555",borderBottom:a?"2px solid #d4a017":"2px solid transparent",marginBottom:-1,background:"none",border:"none",borderBottom:a?"2px solid #d4a017":"2px solid transparent",cursor:"pointer"}),
        content:{padding:"20px 16px",maxWidth:600,margin:"0 auto"},
        empty:{textAlign:"center",color:"#333",padding:"60px 20px"},
      };

      return (
        <div style={S.app}>
          <style>{`
            input,textarea{background:transparent;border:none;outline:none;color:#e8e0d0;font-family:inherit;}
            button{cursor:pointer;border:none;background:none;font-family:inherit;}
            select{outline:none;cursor:pointer;}
            .del-btn{opacity:0;transition:opacity .15s;}
            .set-row:hover .del-btn{opacity:1;}
            @media(hover:none){.del-btn{opacity:1!important;}}
            .preset-btn:hover{background:#d4a017!important;color:#0a0a0a!important;}
            .type-btn:hover{opacity:0.85;}
          `}</style>

          {/* Header */}
          <div style={S.header}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20}}>
              <div style={{color:"#d4a017"}}><DumbbellIcon/></div>
              <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:26,letterSpacing:3,color:"#d4a017"}}>GYM TRACKER</span>
            </div>
            <div style={{display:"flex",overflowX:"auto",paddingBottom:1}}>
              {[["log",<CalendarIcon/>,"LOG"],["week",<WeekIcon/>,"WOCHE"],["stats",<ChartIcon/>,"STATS"],["history",<HistoryIcon/>,"VERLAUF"]].map(([v,icon,label])=>(
                <button key={v} style={S.navBtn(view===v)} onClick={()=>setView(v)}>{icon}{label}</button>
              ))}
            </div>
          </div>

          {/* ── LOG ── */}
          {view==="log" && (
            <div style={S.content}>
              {/* Date + BW + Template row */}
              <div style={{display:"flex",gap:8,marginBottom:16,alignItems:"center"}}>
                <input type="date" value={selectedDate} onChange={e=>setSelectedDate(e.target.value)}
                  style={{flex:1,background:"#111",border:"1px solid #2a2a2a",borderRadius:6,padding:"9px 12px",fontSize:13,color:"#e8e0d0"}}/>
                <button onClick={()=>setShowBw(p=>!p)} style={{background:"#1a1a1a",border:"1px solid #252525",borderRadius:6,padding:"9px 12px",fontSize:12,color:bodyweight[selectedDate]?"#9b5bd4":"#555",whiteSpace:"nowrap"}}>
                  ⚖️ {bodyweight[selectedDate]?`${bodyweight[selectedDate]} kg`:"KG"}
                </button>
                <button onClick={()=>{setShowTemplates(p=>!p);setTemplateView("list");}} style={{background:"#1a1a1a",border:"1px solid #252525",borderRadius:6,padding:"9px 12px",fontSize:12,color:showTemplates?"#d4a017":"#555",whiteSpace:"nowrap"}}>
                  📋
                </button>
              </div>

              {/* Templates Panel */}
              {showTemplates && (
                <div style={{...S.card,marginBottom:16,animation:"fadeIn .2s ease"}}>
                  {templateView==="list" && (
                    <div>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 14px",borderBottom:"1px solid #1a1a1a"}}>
                        <span style={{fontSize:10,color:"#555",letterSpacing:2}}>TRAININGS-TEMPLATES</span>
                        <button onClick={()=>{setTemplateView("edit");setEditingTemplate(null);setTplName("");setTplText("");setTplType("");}}
                          style={{fontSize:11,color:"#d4a017",letterSpacing:1,display:"flex",alignItems:"center",gap:4}}>
                          <span style={{fontSize:16,lineHeight:1}}>+</span> NEU
                        </button>
                      </div>
                      {templates.length===0
                        ? <div style={{padding:"20px 14px",fontSize:12,color:"#444",textAlign:"center"}}>Noch keine Templates. Erstelle dein erstes Training!</div>
                        : templates.map(tpl=>(
                          <div key={tpl.id} style={{padding:"10px 14px",borderBottom:"1px solid #161616",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                            <div>
                              <div style={{fontSize:13,color:"#e8e0d0",marginBottom:2}}>{tpl.name}</div>
                              <div style={{fontSize:10,color:"#555"}}>{tpl.exercises.length} Übungen{tpl.type?` · ${tpl.type}`:""}</div>
                            </div>
                            <div style={{display:"flex",gap:8}}>
                              <button onClick={()=>startEdit(tpl)} style={{fontSize:10,color:"#555",border:"1px solid #2a2a2a",borderRadius:4,padding:"4px 8px"}}>EDIT</button>
                              <button onClick={()=>loadTemplate(tpl)} style={{fontSize:10,color:"#0a0a0a",background:"#d4a017",border:"none",borderRadius:4,padding:"4px 10px",fontWeight:700}}>LADEN</button>
                            </div>
                          </div>
                        ))
                      }
                    </div>
                  )}
                  {(templateView==="edit") && (
                    <div style={{padding:"14px"}}>
                      <div style={{fontSize:10,color:"#555",letterSpacing:2,marginBottom:12}}>{editingTemplate?"TEMPLATE BEARBEITEN":"NEUES TEMPLATE"}</div>
                      <input value={tplName} onChange={e=>setTplName(e.target.value)} placeholder="Name (z.B. Push A, Brust & Trizeps...)"

Schulterdrücken 3×10
Trizepsdrücken 3×12
Dips 3×10"}

                      {tplText && (
                        <div style={{background:"#0e0e0e",borderRadius:6,padding:"8px 12px",marginBottom:10}}>
                          <div style={{fontSize:9,color:"#555",letterSpacing:2,marginBottom:6}}>VORSCHAU</div>
                          {parseTemplateText(tplText).map((ex,i)=>(
                            <div key={i} style={{fontSize:11,color:"#888",marginBottom:3}}>
                              <span style={{color:"#d4a017"}}>{ex.name}</span> · {ex.sets.length} Sätze × {ex.sets[0]?.reps||"?"} Wdhl
                            </div>
                          ))}
                          {parseTemplateText(tplText).length===0 && <div style={{fontSize:11,color:"#444"}}>Kein Format erkannt – prüfe das Format</div>}
                        </div>
                      )}
                      <div style={{display:"flex",gap:8}}>
                        <button onClick={()=>setTemplateView("list")} style={{flex:1,padding:"10px",fontSize:12,color:"#555",border:"1px solid #2a2a2a",borderRadius:6}}>ABBRECHEN</button>
                        {editingTemplate && <button onClick={()=>deleteTemplate(editingTemplate)} style={{padding:"10px 14px",fontSize:12,color:"#c44",border:"1px solid #c44",borderRadius:6}}>🗑️</button>}
                        <button onClick={saveTemplate} style={{flex:2,padding:"10px",fontSize:12,fontWeight:700,color:"#0a0a0a",background:"#d4a017",border:"none",borderRadius:6}}>SPEICHERN</button>
                      </div>
                    </div>
                  )}
                </div>
              )}

              {/* Body weight input */}
              {showBw && (
                <div style={{...S.card,padding:"12px 14px",marginBottom:14,display:"flex",alignItems:"center",gap:10,animation:"fadeIn .2s ease"}}>
                  <span style={{fontSize:11,color:"#555",letterSpacing:1,whiteSpace:"nowrap"}}>KÖRPERGEWICHT</span>
                  <input type="number" placeholder="z.B. 83.5" value={bwInput} onChange={e=>setBwInput(e.target.value)}
                    style={{...S.input,flex:1}}/>
                  <span style={{fontSize:11,color:"#555"}}>kg</span>
                </div>
              )}

              {/* Training type */}
              <div style={{marginBottom:16}}>
                <div style={{fontSize:9,color:"#555",letterSpacing:2,marginBottom:8}}>TRAININGSTYP</div>

                  {TRAINING_TYPES.map(t=>(
                    <button key={t} className="type-btn" onClick={()=>setTrainingType(trainingType===t?"":t)}
                      style={{fontSize:11,borderRadius:5,padding:"5px 11px",border:`1px solid ${trainingType===t?TYPE_COLORS[t]:"#2a2a2a"}`,background:trainingType===t?TYPE_COLORS[t]+"22":"transparent",color:trainingType===t?TYPE_COLORS[t]:"#555",letterSpacing:0.5}}>
                      {t}
                    </button>
                  ))}
                </div>
              </div>

              {/* PR Toast */}
              {newPRs.length > 0 && (
                <div style={{background:"#1a1500",border:"1px solid #d4a017",borderRadius:8,padding:"10px 14px",marginBottom:14,animation:"fadeIn .3s ease"}}>
                  <div style={{fontSize:10,color:"#d4a017",letterSpacing:2,marginBottom:4}}>🏆 NEUER PERSONAL RECORD!</div>
                  <div style={{fontSize:12,color:"#e8e0d0"}}>{newPRs.join(", ")}</div>
                </div>
              )}

              {/* Exercise cards */}
              {exercises.map((ex,ei)=>{
                const last = ex.name.trim() ? getLastSession(ex.name) : null;
                const prevMax = ex.name.trim() ? getExerciseMaxEver(ex.name, selectedDate) : 0;
                return (
                  <div key={ei} style={S.card}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 14px",borderBottom:"1px solid #1a1a1a"}}>
                      <input value={ex.name} onChange={e=>updateExName(ei,e.target.value)}
                        style={{fontSize:14,fontWeight:500,letterSpacing:1,color:"#d4a017",flex:1,background:"transparent",border:"none",outline:"none"}}
                        placeholder="Übung..."/>
                      {prevMax > 0 && <span style={{fontSize:10,color:"#555",marginRight:8,whiteSpace:"nowrap"}}>PR: {prevMax}kg</span>}
                      <button onClick={()=>removeExercise(ei)} style={{color:"#444",padding:4}}><TrashIcon/></button>
                    </div>

                    {last && (
                      <div style={{padding:"8px 14px",background:"#0e0e0e",borderBottom:"1px solid #1a1a1a"}}>
                        <div style={{fontSize:9,color:"#555",letterSpacing:2,marginBottom:5}}>LETZTES MAL · {formatDate(last.date)}</div>
                        <div style={{display:"flex",flexWrap:"wrap",gap:"4px 10px"}}>
                          {last.sets.map((s,i)=>(
                            <span key={i} style={{fontSize:11,color:"#4a7a9b"}}>
                              {i+1}· {s.weight?`${s.weight}kg`:"—"} × {s.reps||"—"}
                            </span>
                          ))}
                        </div>
                      </div>
                    )}

                    <div style={{padding:"10px 14px"}}>
                      <div style={{display:"grid",gridTemplateColumns:"28px 1fr 1fr 32px",gap:8,marginBottom:8,paddingBottom:6,borderBottom:"1px solid #1a1a1a"}}>
                        {["#","KG","WDHL",""].map((h,i)=><span key={i} style={{fontSize:9,color:"#444",letterSpacing:1,textAlign:"center"}}>{h}</span>)}
                      </div>
                      {ex.sets.map((s,si)=>{
                        const ls=last&&last.sets[si];
                        const isPR = s.weight && prevMax > 0 && parseFloat(s.weight) > prevMax;
                        return (
                          <div key={si} className="set-row" style={{display:"grid",gridTemplateColumns:"28px 1fr 1fr 32px",gap:8,marginBottom:6,alignItems:"center"}}>
                            <span style={{fontSize:11,color:"#555",textAlign:"center"}}>{si+1}</span>
                            <div style={{position:"relative",display:"flex",alignItems:"center"}}>
                              <input type="number" placeholder={ls?.weight||"—"} value={s.weight}
                                onChange={e=>updateSet(ei,si,"weight",e.target.value)}
                                style={{...S.input,borderColor:isPR?"#d4a017":ls&&!s.weight?"#1e2e3a":"#252525"}}/>
                              {isPR && <span style={{position:"absolute",right:-2,top:-8,fontSize:12,animation:"prPop .4s ease"}}>🏆</span>}
                            </div>
                            <input type="number" placeholder={ls?.reps||"—"} value={s.reps}
                              onChange={e=>updateSet(ei,si,"reps",e.target.value)}
                              style={{...S.input,borderColor:ls&&!s.reps?"#1e2e3a":"#252525"}}/>
                            <button className="del-btn" onClick={()=>removeSet(ei,si)} style={{color:"#333",padding:4}}><TrashIcon/></button>
                          </div>
                        );
                      })}
                      <button onClick={()=>addSet(ei)} style={{marginTop:6,fontSize:11,color:"#555",letterSpacing:1,display:"flex",alignItems:"center",gap:4,padding:"4px 0"}}>
                        <PlusIcon/> SATZ HINZUFÜGEN
                      </button>
                    </div>
                  </div>
                );
              })}

              {/* Add exercise */}
              <div style={{marginBottom:16}}>
                <div style={{display:"flex",gap:8,marginBottom:8}}>
                  <input value={newExName} onChange={e=>setNewExName(e.target.value)}
                    onKeyDown={e=>e.key==="Enter"&&addExercise()}
                    placeholder="Neue Übung eingeben..."
                    style={{flex:1,background:"#111",border:"1px solid #252525",borderRadius:7,padding:"10px 14px",fontSize:13,color:"#e8e0d0"}}/>
                  <button onClick={()=>addExercise()} style={{background:"#d4a017",color:"#0a0a0a",borderRadius:7,padding:"10px 16px",display:"flex",alignItems:"center"}}>
                    <PlusIcon/>
                  </button>
                </div>
                <button onClick={()=>setShowPresets(p=>!p)} style={{fontSize:11,color:"#555",letterSpacing:1,display:"flex",alignItems:"center",gap:4}}>
                  <ChevronIcon up={showPresets}/> ÜBUNGEN AUS LISTE
                </button>
                {showPresets && (
                  <div style={{marginTop:10}}>
                    {allExNames.filter(n=>!PRESET_EXERCISES.includes(n)).length > 0 && (
                      <>
                        <div style={{fontSize:9,color:"#555",letterSpacing:2,marginBottom:6}}>MEINE ÜBUNGEN</div>
                        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
                          {allExNames.filter(n=>!PRESET_EXERCISES.includes(n)).map(name=>(
                            <button key={name} className="preset-btn" onClick={()=>addExercise(name)}
                              style={{fontSize:11,border:"1px solid #2a3a2a",borderRadius:4,padding:"5px 10px",color:"#6a9",letterSpacing:0.5}}>
                              {name}
                            </button>
                          ))}
                        </div>
                        <div style={{fontSize:9,color:"#555",letterSpacing:2,marginBottom:6}}>VORLAGEN</div>
                      </>
                    )}
                    <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                      {PRESET_EXERCISES.map(name=>(
                        <button key={name} className="preset-btn" onClick={()=>addExercise(name)}
                          style={{fontSize:11,border:"1px solid #2a2a2a",borderRadius:4,padding:"5px 10px",color:"#888",letterSpacing:0.5}}>
                          {name}
                        </button>
                      ))}
                    </div>
                  </div>
                )}
              </div>

              {/* Note */}
              <div style={{marginBottom:16}}>
                <div style={{fontSize:9,color:"#555",letterSpacing:2,marginBottom:8}}>NOTIZ</div>

                  rows={2} style={{width:"100%",background:"#111",border:"1px solid #252525",borderRadius:7,padding:"10px 14px",fontSize:13,color:"#e8e0d0",resize:"none",lineHeight:1.5}}/>
              </div>

              <button style={S.saveBtn} onClick={saveDay}>TRAINING SPEICHERN</button>
            </div>
          )}

          {/* ── WOCHE ── */}
          {view==="week" && (
            <div style={S.content}>
              <div style={{fontSize:10,color:"#555",letterSpacing:2,marginBottom:16}}>WOCHE VOM {formatDate(weekDates[0])}</div>

              {/* Week stats */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:20}}>
                {[["EINHEITEN",weekSummary.sessions,"×"],["VOLUMEN",weekSummary.volume>0?`${(weekSummary.volume/1000).toFixed(1)}t`:"—",""],["TAGE",weekDates.filter(d=>workouts[d]).length,"/ 7"]].map(([l,v,u])=>(
                  <div key={l} style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:8,padding:"12px 10px",textAlign:"center"}}>
                    <div style={{fontSize:9,color:"#555",letterSpacing:2,marginBottom:4}}>{l}</div>
                    <div style={{fontSize:20,fontFamily:"'Bebas Neue',sans-serif",color:"#d4a017",letterSpacing:2}}>{v}<span style={{fontSize:10,color:"#666",marginLeft:2}}>{u}</span></div>
                  </div>
                ))}
              </div>

              {/* Body weight chart this week */}
              {weekDates.some(d=>bodyweight[d]) && (
                <div style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:10,padding:"14px",marginBottom:16}}>
                  <div style={{fontSize:10,color:"#555",letterSpacing:2,marginBottom:8}}>KÖRPERGEWICHT (KG)</div>
                  <SparkLine data={weekDates.filter(d=>bodyweight[d]).map(d=>({date:d,value:parseFloat(bodyweight[d])}))} color="#9b5bd4"/>
                </div>
              )}

              {/* Day breakdown */}
              {weekDates.map(d=>{
                const day = workouts[d];
                const isToday = d===toLocalDateStr();
                const typeColor = day?.type ? TYPE_COLORS[day.type]||"#555" : "#333";
                return (
                  <div key={d} style={{background:"#111",border:`1px solid ${isToday?"#2a2a1a":"#1e1e1e"}`,borderRadius:10,marginBottom:10,overflow:"hidden"}}>
